version: 2

builds:
  - main: .
    binary: redpine
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/redpine-ai/connect-cli/internal/version.Version={{.Version}}
      - -X github.com/redpine-ai/connect-cli/internal/version.Commit={{.ShortCommit}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "connect-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: redpine-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    name: connect-cli
    homepage: "https://github.com/redpine-ai/connect-cli"
    description: "CLI for the Connect platform — MCP client for AI agents"
    license: "MIT"
    install: |
      bin.install "redpine"

      output = Utils.safe_popen_read(bin/"redpine", "completion", "bash")
      (bash_completion/"redpine").write output
      output = Utils.safe_popen_read(bin/"redpine", "completion", "zsh")
      (zsh_completion/"_redpine").write output
      output = Utils.safe_popen_read(bin/"redpine", "completion", "fish")
      (fish_completion/"redpine.fish").write output
